<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="iris" cx="42%" cy="38%" r="62%">
      <stop offset="0%"   stop-color="#93C5FD"/>
      <stop offset="48%"  stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </radialGradient>
    <clipPath id="eyeClip">
      <path d="M 22 80 C 46 42,154 42,178 80 C 154 118,46 118,22 80 Z"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" fill="#0F172A" rx="40"/>

  <!-- Eye whites -->
  <path d="M 22 80 C 46 42,154 42,178 80 C 154 118,46 118,22 80 Z" fill="#14213D"/>

  <!-- Iris (clipped to eye shape) -->
  <circle cx="100" cy="80" r="34" fill="url(#iris)" clip-path="url(#eyeClip)"/>

  <!-- Iris detail ring -->
  <circle cx="100" cy="80" r="26" fill="none" stroke="#BFDBFE" stroke-width="0.7"
          opacity="0.22" clip-path="url(#eyeClip)"/>

  <!-- Pupil -->
  <circle cx="100" cy="80" r="15" fill="#060D1A" clip-path="url(#eyeClip)"/>

  <!-- Gaze crosshair -->
  <line x1="100" y1="70" x2="100" y2="90"
        stroke="#3B82F6" stroke-width="1.6" stroke-linecap="round" clip-path="url(#eyeClip)"/>
  <line x1="90"  y1="80" x2="110" y2="80"
        stroke="#3B82F6" stroke-width="1.6" stroke-linecap="round" clip-path="url(#eyeClip)"/>

  <!-- Gaze center point -->
  <circle cx="100" cy="80" r="2.8" fill="#60A5FA" clip-path="url(#eyeClip)"/>

  <!-- Specular highlight -->
  <ellipse cx="112" cy="68" rx="7.5" ry="5" fill="white" opacity="0.15"
           transform="rotate(-25,112,68)" clip-path="url(#eyeClip)"/>
  <circle  cx="114" cy="66" r="3.5" fill="white" opacity="0.24" clip-path="url(#eyeClip)"/>

  <!-- Upper eyelid -->
  <path d="M 22 80 C 46 42,154 42,178 80"
        fill="none" stroke="#334155" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Lower eyelid -->
  <path d="M 22 80 C 46 118,154 118,178 80"
        fill="none" stroke="#1E293B" stroke-width="1" stroke-linecap="round"/>

  <!-- Wordmark -->
  <text x="100" y="150"
        font-family="'Helvetica Neue','Arial Black',Arial,sans-serif"
        font-size="34" font-weight="900"
        fill="#F1F5F9" text-anchor="middle" letter-spacing="9">JTM</text>

  <!-- Rule -->
  <rect x="54" y="157" width="92" height="1" fill="#1D4ED8" rx="1" opacity="0.65"/>

  <!-- Tagline -->
  <text x="100" y="172"
        font-family="Arial,sans-serif"
        font-size="9" fill="#3B82F6"
        text-anchor="middle" letter-spacing="3.5">COMUNICAÇÃO</text>
</svg>
