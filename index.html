<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#1A4A7A" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="JTM" />
    <title>JTM</title>

    <!--
      Content Security Policy (A05 / A08)
      ─────────────────────────────────────────────────────────────────────────
      default-src 'none'          → bloqueia tudo que não for explicitamente permitido
      script-src  'self' blob: https://cdn.jsdelivr.net
                  → 'self' cobre os bundles do Vite; blob: cobre workers criados como blob;
                    cdn.jsdelivr.net é necessário porque o worker do MediaPipe usa
                    importScripts() para carregar o loader WASM a partir do CDN.
                    O script-src é aplicado a importScripts() dentro de workers (spec CSP3),
                    por isso a mesma origem precisa aparecer aqui E no worker-src.
                  'wasm-unsafe-eval' → necessário para JIT/compilação do WASM do MediaPipe / Piper
      style-src   'self' 'unsafe-inline' → React usa style={} que vira atributo inline
      connect-src → permite fetch dos binários do MediaPipe e dos arquivos do Piper TTS:
                    cdn.jsdelivr.net         → WASM do MediaPipe + piper-phonemize
                    storage.googleapis.com   → modelo do FaceLandmarker (~11 MB)
                    huggingface.co           → ponto de entrada do Hub e voices.json
                    *.xethub.hf.co           → CDN real dos arquivos grandes da HF:
                                               o download do .onnx recebe um redirect
                                               302 para cas-bridge.xethub.hf.co (LFS
                                               via XetHub). A CSP verifica a URL após
                                               o redirect, por isso esse domínio precisa
                                               ser autorizado explicitamente.
                    cdnjs.cloudflare.com     → ONNX Runtime WASM (~26 MB), usado
                                               internamente pela piper-tts-web para
                                               rodar a inferência neural no navegador
      worker-src  'self' blob: https://cdn.jsdelivr.net
                  → O MediaPipe (tasks-vision) cria Web Workers a partir de scripts
                    hospedados no cdn.jsdelivr.net para rodar a inferência neural (WASM)
                    em thread separada. Sem essa origem, o worker é bloqueado e a câmera
                    falha com status 'error' mesmo após a permissão ser concedida.
      media-src   blob:           → áudio gerado pelo Piper via createObjectURL
      img-src     'self' data: blob: → ícones PWA e SVGs inline
      frame-ancestors 'none'      → bloqueia embedding em iframe (anti-clickjacking, A05)
      object-src  'none'          → desabilita plugins (Flash, Java)
      base-uri    'self'          → impede injeção de <base href>
      form-action 'none'          → app não tem formulários com POST
    -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'none';
      script-src 'self' blob: https://cdn.jsdelivr.net 'wasm-unsafe-eval';
      style-src 'self' 'unsafe-inline';
      connect-src 'self'
        https://cdn.jsdelivr.net
        https://storage.googleapis.com
        https://huggingface.co
        https://*.xethub.hf.co
        https://cdnjs.cloudflare.com
        blob:;
      worker-src 'self' blob: https://cdn.jsdelivr.net;
      media-src blob:;
      img-src 'self' data: blob:;
      manifest-src 'self';
      font-src 'self';
      frame-ancestors 'none';
      object-src 'none';
      base-uri 'self';
      form-action 'none';
    " />

    <!-- Impede sniffing de MIME type (A05) -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
